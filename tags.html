<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标签 - Eagle Mobile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eeeeee;
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 70px;
}
h1 { font-size: 20px; margin-bottom: 12px; }
a { color: #64b5f6; text-decoration: none; }
.back { display: inline-block; margin-bottom: 14px; font-size: 15px; color: #64b5f6; }
.nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #16213e;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #333;
    z-index: 100;
}
.nav a {
    text-align: center;
    color: #888;
    font-size: 12px;
}
.nav a.active { color: #64b5f6; }
.nav .icon { font-size: 18px; display: block; margin-bottom: 2px; }
.list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 12px;
    border-bottom: 1px solid #2a2a4a;
}
.list-item .name { font-size: 16px; color: #fff; }
.list-item .count { font-size: 13px; color: #888; }
.tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-chip {
    background: #2a2a4a;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    color: #dddddd;
}
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
}
.grid-item {
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
}
.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.search-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #16213e;
    color: #fff;
    font-size: 15px;
    margin-bottom: 12px;
    outline: none;
}
.detail-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    z-index: 200;
    overflow-y: auto;
}
.detail-overlay.show { display: block; }
.detail-close {
    position: fixed;
    top: 12px; left: 12px;
    color: #64b5f6;
    cursor: pointer;
    z-index: 201;
    background: rgba(0,0,0,0.6);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 15px;
}
.detail-img {
    width: 100%;
    max-height: 55vh;
    object-fit: contain;
    background: #000;
}
.detail-info { padding: 16px; }
.detail-info .row { margin-bottom: 14px; }
.detail-info .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.detail-info .value { font-size: 15px; }
.detail-info .value a { color: #64b5f6; word-break: break-all; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.detail-tags span {
    background: #2a2a4a;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
}
.color-row { display: flex; gap: 8px; margin-top: 4px; }
.color-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #444;
}
.page-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
    flex-wrap: wrap;
}
.page-nav a {
    background: #2a2a4a;
    padding: 8px 16px;
    border-radius: 8px;
    color: #ddd;
    font-size: 14px;
}
.page-nav a.current {
    background: #64b5f6;
    color: #000;
}
.sort-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.sort-btn {
    background: #2a2a4a;
    color: #ddd;
    border: none;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
}
.sort-btn.active {
    background: #64b5f6;
    color: #000;
}
</style>
</head>
<body>
<h1>🏷️ 所有标签</h1>
<div class="tag-cloud">
</div>
<div class="nav"><a href="index.html"><span class="icon">📁</span>文件夹</a><a href="tags.html" class="active"><span class="icon">🏷️</span>标签</a><a href="search.html"><span class="icon">🔍</span>搜索</a></div></body>
</html>
